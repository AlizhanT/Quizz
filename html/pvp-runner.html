<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="pageTitle" data-translate="page.title">PvP Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/test-runner.css">
    <link rel="stylesheet" href="../css/pvp-runner.css">
</head>
<body>
    <div class="pvp-container">
        <!-- Player 1 Section (Left) -->
        <div class="player-section player-left" id="player1Section">
            <div class="player-header">Player 1</div>
            <div class="test-container" id="player1Container">
                <!-- Top Controls -->
                <div class="top-controls">
                    <button class="restart-btn" onclick="restartTest(1)" title="Restart Test">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#6c757d"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg>
                    </button>
                </div>

                <!-- Side Notification Panel -->
                <div id="notificationPanel1" class="notification-panel hidden">
                    <div class="notification-header">
                        <span class="notification-title">Notifications</span>
                        <button class="notification-close" onclick="hideNotificationPanel(1)">×</button>
                    </div>
                    <div id="notificationContent1" class="notification-content">
                        <!-- Notifications will be added here -->
                    </div>
                </div>

                <div id="questionContainer1" class="question-container">
                    <!-- Question content will be dynamically inserted here -->
                </div>

                <div id="resultsContainer1" class="results-container hidden">
                    <h2 class="results-title">Test Complete!</h2>
                    <div class="score-display" id="scoreDisplay1">0%</div>
                    <div class="results-message" id="resultsMessage1">You have completed the test.</div>
                </div>
            </div>

            <!-- Question Counter -->
            <div class="question-counter" id="questionCounter1">1/1</div>

            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <button class="nav-btn btn-prev" onclick="previousQuestion(1)" title="Previous">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
                </button>
                <button class="nav-btn btn-next" onclick="nextQuestion(1)" title="Next">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg>
                </button>
            </div>
        </div>

        <!-- Player 2 Section (Right) -->
        <div class="player-section player-right" id="player2Section">
            <div class="player-header">Player 2</div>
            <div class="test-container" id="player2Container">
                <!-- Top Controls -->
                <div class="top-controls">
                    <button class="restart-btn" onclick="restartTest(2)" title="Restart Test">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#6c757d"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg>
                    </button>
                    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#6c757d"><path d="M120-120v-200h80v120h120v80H120Zm520 0v-80h120v-120h80v200H640ZM120-640v-200h200v80H200v120h-80Zm640 0v-120H640v-80h200v200h-80Z"/></svg>
                    </button>
                </div>

                <!-- Side Notification Panel -->
                <div id="notificationPanel2" class="notification-panel hidden">
                    <div class="notification-header">
                        <span class="notification-title">Notifications</span>
                        <button class="notification-close" onclick="hideNotificationPanel(2)">×</button>
                    </div>
                    <div id="notificationContent2" class="notification-content">
                        <!-- Notifications will be added here -->
                    </div>
                </div>

                <div id="questionContainer2" class="question-container">
                    <!-- Question content will be dynamically inserted here -->
                </div>

                <div id="resultsContainer2" class="results-container hidden">
                    <h2 class="results-title">Test Complete!</h2>
                    <div class="score-display" id="scoreDisplay2">0%</div>
                    <div class="results-message" id="resultsMessage2">You have completed the test.</div>
                </div>
            </div>

            <!-- Question Counter -->
            <div class="question-counter" id="questionCounter2">1/1</div>

            <!-- Navigation Buttons -->
            <div class="navigation-buttons">
                <button class="nav-btn btn-prev" onclick="previousQuestion(2)" title="Previous">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
                </button>
                <button class="nav-btn btn-next" onclick="nextQuestion(2)" title="Next">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg>
                </button>
            </div>
        </div>
    </div>



    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/language.js"></script>
    <script src="../js/fill-in-blank.js"></script>
    <script src="../js/pvp-runner.js"></script>
</body>
</html>
