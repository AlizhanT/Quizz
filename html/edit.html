<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="page.title">Multiple Choice Test Generator</title>

    <!-- CSS -->

                        "secondary-fixed": "#6ffbbe",

                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#005236",
                        "on-primary-container": "#fffbff",
                        "on-error-container": "#93000a",

                        "on-tertiary-fixed": "#23005c",

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

<body class="bg-surface text-on-surface">

<!-- Main Content Area -->
<main class="min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl docked full-width top-0 sticky z-40 shadow-sm dark:shadow-none flex justify-between items-center w-full px-8 h-16 border-b border-transparent">
<div class="flex items-center gap-4 flex-1">
<div class="p-2 bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary">edit_note</span>
</div>
<input class="bg-transparent border-none focus:ring-0 text-xl font-bold text-indigo-600 dark:text-indigo-400 font-['Plus_Jakarta_Sans'] tracking-tight w-full max-w-xl" id="testTitle" data-translate-placeholder="quiz.titlePlaceholder" placeholder="Enter quiz title..." type="text" maxlength="36"/>
</div>
<div class="flex items-center gap-3">
<button class="px-4 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors rounded-lg flex items-center gap-2 text-sm font-medium" onclick="generatePDF()">
<span class="material-symbols-outlined text-lg">download</span>
                    Download PDF
                </button>
<button class="px-6 py-2 bg-primary-container text-white rounded-lg font-semibold shadow-sm hover:brightness-110 active:scale-95 duration-150 transition-transform" onclick="saveQuiz()">
                    Save Quiz
                </button>
<button class="px-4 py-2 bg-primary text-white rounded-lg font-semibold shadow-sm hover:brightness-110 active:scale-95 duration-150 transition-transform" onclick="runTest()">
                    ▶ RUN
                </button>
<button class="px-4 py-2 text-error hover:bg-error/5 transition-colors rounded-lg flex items-center gap-2 text-sm font-medium" onclick="saveAndGoHome()">
<span class="material-symbols-outlined text-lg">home</span>
                    Home
                </button>
</div>
</header>

<div class="flex flex-1 p-8 gap-8 bg-surface-container-low">
<!-- Left Column: Main Content -->
<div class="flex-1 space-y-6 max-w-4xl mx-auto">
<!-- Instructions Section -->
<section class="bg-surface-container-lowest rounded-[2rem] p-8 shadow-sm border border-outline-variant/15">
<div class="flex justify-between items-start mb-6">
<div class="flex items-center gap-3">
<span class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary font-bold">
<span class="material-symbols-outlined">description</span>
</span>
<h3 class="font-headline font-semibold text-lg text-on-surface">Instructions</h3>
</div>
</div>
<textarea id="instructions" class="w-full bg-surface-container-highest border-none rounded-xl p-4 focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-on-surface-variant/50" placeholder="Add instructions for your quiz (optional)..." rows="3"></textarea>
</section>

<!-- Questions Container -->
<div class="questions-container" id="questionsContainer"></div>

<!-- Add Question Button -->
<button class="w-full py-8 border-2 border-dashed border-primary/30 rounded-[2rem] flex flex-col items-center justify-center gap-3 text-primary hover:bg-primary/5 hover:border-primary transition-all group" id="addQuestionBtn">
<div class="w-14 h-14 rounded-full bg-primary/10 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</div>
<span class="font-headline font-bold text-lg">Add Question</span>
</button>
</div>

</div>
</main>

<!-- Hidden preview for PDF generation -->
<div id="pdfPreview" style="display: none;"></div>

    <!-- Modal for notifications -->
    <div id="notificationModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="bg-surface-container-lowest rounded-[2rem] p-8 shadow-xl border border-outline-variant/15 max-w-md w-full mx-4">
            <div class="modal-header mb-6">
                <h3 id="modalTitle" class="font-headline font-bold text-xl text-on-surface" data-translate="modal.notification">Notification</h3>
            </div>
            <div class="modal-body">
                <div id="modalMessage" class="text-on-surface-variant mb-6" data-translate="modal.messagePlaceholder">Message goes here</div>
                <div id="modalButtons" class="flex gap-3 justify-end"></div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="../js/loading-manager.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/language.js"></script>
    <script src="../js/top-navigation.js"></script>
    <script src="../js/navigation-scroll.js"></script>
    <script src="../js/side-navigation.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/pdf-converter.js"></script>
    
    <script>
        // Additional functions for the new UI elements
        function publishQuiz() {
            const modal = document.getElementById('notificationModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalButtons = document.getElementById('modalButtons');
            
            modalTitle.textContent = 'Publish Quiz';
            modalMessage.textContent = 'Your quiz has been published successfully!';
            modalButtons.innerHTML = `
                <button class="px-6 py-2 bg-primary text-white rounded-lg font-semibold shadow-sm hover:brightness-110 active:scale-95 duration-150 transition-transform" onclick="closeModal()">OK</button>
            `;
            
            modal.classList.remove('hidden');
        }
        
        function closeModal() {
            const modal = document.getElementById('notificationModal');
            modal.classList.add('hidden');
        }
        
        function updateStatistics() {
            const questionsContainer = document.getElementById('questionsContainer');
            const questionCount = questionsContainer.children.length;
            const questionCountElement = document.getElementById('questionCount');
            const maxPointsElement = document.getElementById('maxPoints');
            const avgTimeElement = document.getElementById('avgTime');

            if (!questionCountElement || !maxPointsElement || !avgTimeElement) return;
            
            questionCountElement.textContent = questionCount;
            maxPointsElement.textContent = questionCount * 5; // Assuming 5 points per question
            avgTimeElement.textContent = questionCount > 0 ? `${Math.ceil(questionCount * 0.5)} min` : '0 min';
        }
        
        // Update statistics when questions are added/removed
        const observer = new MutationObserver(updateStatistics);
        observer.observe(document.getElementById('questionsContainer'), { childList: true });
        
        // Initialize statistics
        updateStatistics();
        
        // Add character counter for title
        document.getElementById('testTitle').addEventListener('input', function(e) {
            const maxLength = 36;
            const currentLength = e.target.value.length;
            // You can add a character counter display if needed
        });
    </script>
</body>
</html>
