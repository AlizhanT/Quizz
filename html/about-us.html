<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="page.title">Saved Quizzes</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#23005c",
                    "surface": "#f9f9ff",
                    "on-tertiary-container": "#fffbff",
                    "on-error": "#ffffff",
                    "primary": "#4648d4",
                    "surface-tint": "#494bd6",
                    "primary-container": "#6063ee",
                    "on-secondary-fixed": "#002113",
                    "surface-container": "#e7eeff",
                    "inverse-surface": "#263143",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#6cf8bb",
                    "tertiary": "#6b38d4",
                    "primary-fixed": "#e1e0ff",
                    "on-surface-variant": "#464554",
                    "inverse-primary": "#c0c1ff",
                    "secondary-fixed": "#6ffbbe",
                    "tertiary-fixed-dim": "#d0bcff",
                    "tertiary-container": "#8455ef",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#dee8ff",
                    "on-background": "#111c2d",
                    "surface-variant": "#d8e3fb",
                    "on-primary-container": "#fffbff",
                    "surface-container-highest": "#d8e3fb",
                    "on-secondary-fixed-variant": "#005236",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "inverse-on-surface": "#ecf1ff",
                    "background": "#f9f9ff",
                    "secondary": "#006c49",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f0f3ff",
                    "outline-variant": "#c7c4d7",
                    "surface-bright": "#f9f9ff",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#07006c",
                    "tertiary-fixed": "#e9ddff",
                    "primary-fixed-dim": "#c0c1ff",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#4edea3",
                    "on-surface": "#111c2d",
                    "on-secondary-container": "#00714d",
                    "outline": "#767586",
                    "on-tertiary-fixed-variant": "#5516be",
                    "surface-dim": "#cfdaf2",
                    "on-secondary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans", "sans-serif"],
                    "body": ["Plus Jakarta Sans", "sans-serif"],
                    "label": ["Plus Jakarta Sans", "sans-serif"]
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9f9ff; }
        h1, h2, h3, p, span, table, button, input { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="text-on-background bg-surface">
<!-- SideNavBar -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-surface-container-lowest border-r border-outline-variant/30 flex flex-col p-6 z-50" id="sideNavbar">
<div class="mb-10">
<div class="text-2xl font-extrabold text-indigo-600 tracking-tighter">QuizMaster Pro</div>
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant opacity-60">Teacher Dashboard</p>
</div>
<nav class="flex-1 space-y-1">
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container transition-all font-headline font-bold" href="#" onclick="goToSavedQuizzes()">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span data-translate="navigation.savedQuizzes">Saved Quizzes</span>
</a>
<a  class="flex items-center gap-3 px-4 py-3 bg-primary/10 text-primary rounded-xl font-headline font-bold transition-all" href="#" onclick="goToAbout()">
<span class="material-symbols-outlined">info</span>
<span data-translate="navigation.about">About</span>
</a>
</nav>
<div class="mt-auto pt-6 border-t border-outline-variant/30">
<button class="w-full py-4 bg-primary text-on-primary rounded-2xl font-headline font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all mb-4" onclick="createNewQuiz()">
<span class="material-symbols-outlined">add_circle</span>
<span data-translate="navigation.createNewQuiz">Create New Quiz</span>
</button>
<div class="flex items-center gap-3 px-4 py-3 hover:bg-surface-container transition-all font-headline font-bold rounded-xl cursor-pointer" onclick="openProfileSettings()">
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold text-xs" id="userAvatar">U</div>
<span class="text-sm font-bold text-on-surface" id="userName">Loading...</span>
</div>
<button class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container transition-all font-headline font-bold rounded-xl w-full" onclick="logout()">
<span class="material-symbols-outlined">logout</span>
<span data-translate="auth.logout">Log Out</span>
</button>
</div>
</aside>
<!-- Top Navigation -->
<header class="fixed top-0 right-0 left-64 h-16 z-40 bg-white/80 backdrop-blur-md flex justify-between items-center px-8 border-b border-outline-variant/30">
<div class="flex-1 max-w-md">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">search</span>
<input class="w-full pl-12 pr-12 py-2 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/20 text-sm font-medium transition-all" id="searchInput" data-translate-placeholder="quiz.searchPlaceholder" placeholder="Search saved quizzes..." type="text" onkeyup="searchQuizzes()"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-surface-container text-on-surface-variant hover:bg-error/10 hover:text-error transition-colors flex items-center justify-center opacity-0 group-focus-within:opacity-100 transition-opacity" onclick="clearSearch()" title="Clear search">
<span class="material-symbols-outlined text-lg">close</span>
</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="ml-64 pt-24 px-8 pb-12 min-h-screen">
<!-- Header Section -->
<div class="mb-10 flex items-end justify-between">
<div>
<h1 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2" data-translate="aboutUs">About Us</h1>
</div>
</div>

<div>
  <p>Site was developed and shared by Company. Thank yon for your usage and support!</p>
</div>


    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/loading-manager.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/language.js"></script>
    <script src="../js/navigation-scroll.js"></script>
    <script src="../js/side-navigation.js"></script>
    <script src="../js/saved-quizzes.js"></script>
</body>
</html>
